name: CI

# Build + test on every push (to any branch except main) and on every PR.
# Pushes to main are covered by the deploy workflow, which calls this one as a
# gate (workflow_call) so a deploy only happens when the build is green.
"on":
  push:
    branches-ignore:
      - main
  pull_request: {}
  workflow_call: {}

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Type-check & build
        run: npm run build
      - name: Lint
        run: npm run lint
      - name: Run tests
        run: npm test
